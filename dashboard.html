<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPTIS | Professor Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <a href="index.html" class="logo">
      <div class="logo-icon">C</div>
      <span class="logo-text">CPTIS<span>.</span></span>
    </a>
    <div class="nav-links">
      <a href="index.html" class="nav-btn">Find Ideas</a>
      <span class="nav-btn active" style="cursor: default;">Dashboard</span>
      <button class="btn btn-outline" id="logoutBtn">Logout</button>
    </div>
  </nav>

  <!-- Main Content Container -->
  <main class="container">
    
    <!-- Dashboard Header -->
    <header class="dashboard-header">
      <div class="dashboard-title">
        <h2 id="welcomeTitle">Welcome, Professor</h2>
        <p id="profDeptSubtitle">Department of Computer Science</p>
      </div>
      <div>
        <button class="btn btn-primary" id="createNewProjectBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          Create New Proposal
        </button>
      </div>
    </header>

    <!-- Stats Grid -->
    <section class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        </div>
        <div class="stat-info">
          <span class="stat-label">Total Proposals</span>
          <span class="stat-val" id="statTotalProjects">0</span>
        </div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        </div>
        <div class="stat-info">
          <span class="stat-label">Active (Open)</span>
          <span class="stat-val" id="statActiveProjects">0</span>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
        </div>
        <div class="stat-info">
          <span class="stat-label">Student Inquiries</span>
          <span class="stat-val" id="statInquiries">0</span>
        </div>
      </div>
    </section>

    <!-- Tabs Control -->
    <div class="dashboard-tabs">
      <button class="tab-btn active" id="projectsTabBtn" data-section="projectsSection">My Proposals</button>
      <button class="tab-btn" id="inquiriesTabBtn" data-section="inquiriesSection">Student Inquiries</button>
    </div>

    <!-- Proposals Section -->
    <section class="dashboard-section active" id="projectsSection">
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Proposal Details</th>
              <th>Type</th>
              <th>Status</th>
              <th>Popularity</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="projectsTableBody">
            <!-- Project rows will be rendered here dynamically -->
          </tbody>
        </table>
      </div>
    </section>

    <!-- Inquiries Section -->
    <section class="dashboard-section" id="inquiriesSection">
      <div class="inquiries-list" id="inquiriesListContainer">
        <!-- Inquiry cards will be rendered here dynamically -->
      </div>
    </section>

  </main>

  <!-- Project Creation/Edit Modal -->
  <div class="modal-overlay" id="projectModal">
    <div class="modal-content" style="max-width: 680px;">
      <div class="modal-header">
        <h3 id="projectModalTitle" style="font-size: 1.3rem;">Create Project Proposal</h3>
        <button class="modal-close" id="closeProjectModalBtn">&times;</button>
      </div>
      <div class="modal-body">
        <form id="projectForm" class="auth-form" style="gap: 15px;">
          
          <div class="form-group">
            <label for="projTitle">Project / Thesis Title *</label>
            <input type="text" id="projTitle" placeholder="e.g. Advancing Large Language Models for Cyber Defense" required>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label for="projType">Proposal Type *</label>
              <select id="projType" required>
                <option value="thesis">Thesis Idea</option>
                <option value="research">Research Project</option>
                <option value="project">Capstone / Course Project</option>
              </select>
            </div>
            <div class="form-group">
              <label for="projDept">Department *</label>
              <select id="projDept" required>
                <option value="Computer Science">Computer Science</option>
                <option value="Electrical Engineering">Electrical Engineering</option>
                <option value="Bioengineering">Bioengineering</option>
              </select>
            </div>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label for="projDuration">Estimated Duration *</label>
              <input type="text" id="projDuration" placeholder="e.g. 1 Semester, 6 Months, 1 Year" required>
            </div>
            <div class="form-group" id="statusGroup" style="display: none;">
              <label for="projStatus">Project Status *</label>
              <select id="projStatus">
                <option value="open">Open (Accepting Applicants)</option>
                <option value="in-progress">In Progress</option>
                <option value="completed">Completed</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="projSkills">Required Skills & Keywords (Comma separated) *</label>
            <input type="text" id="projSkills" placeholder="e.g. Python, Machine Learning, PyTorch, Git" required>
          </div>

          <div class="form-group">
            <label for="projPrereqs">Prerequisites & Coursework</label>
            <textarea id="projPrereqs" placeholder="e.g. Completed CS 301, Minimum GPA 3.5, basic knowledge of algorithms" style="min-height: 80px;"></textarea>
          </div>

          <div class="form-group">
            <label for="projDesc">Detailed Description *</label>
            <textarea id="projDesc" placeholder="Describe the objectives, research scope, methodologies, and expected deliverables..." style="min-height: 140px;" required></textarea>
          </div>

          <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 15px;">
            <button type="button" class="btn btn-secondary" id="cancelProjectBtn">Cancel</button>
            <button type="submit" class="btn btn-primary" id="saveProjectBtn">Publish Proposal</button>
          </div>

        </form>
      </div>
    </div>
  </div>

  <!-- Toast Notification Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Scripts -->
  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
